<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinguaBot</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="dark">
    <div class="app">
      <!-- Header -->
      <header class="header">
        <div class="logo">🌐 LinguaBot</div>
        <div class="header-actions">
          <button class="icon-btn" id="themeBtn" title="Toggle theme">☀️</button>
          <select id="langSelect" title="Response language"></select>
          <button class="icon-btn" id="translatePageBtn" title="Translate this page">📄</button>
          <button class="icon-btn" id="settingsBtn" title="Settings">⚙️</button>
        </div>
      </header>

      <!-- No API key warning -->
      <div class="no-key-banner" id="noKeyBanner">
        ⚠️ No API key. <span class="link" id="goSettings">Open Settings</span>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="chat">💬 Chat</button>
        <button class="tab" data-tab="history">🕐 History</button>
      </div>

      <!-- Chat Tab -->
      <div class="tab-content active" id="chatTab">
        <div class="messages" id="messages">
          <div class="welcome">
            <div class="welcome-icon">🌍</div>
            <p>Type in <strong>any language</strong>.</p>
            <p>I'll reply in your chosen language.</p>
          </div>
        </div>

        <div class="input-area">
          <textarea id="userInput" placeholder="Type in any language..." rows="2"></textarea>
          <button class="voice-btn" id="voiceBtn" title="Voice input">🎤</button>
          <button class="send-btn" id="sendBtn" title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>

        <div class="footer">
          <button class="clear-btn" id="clearBtn">Clear chat</button>
          <span class="footer-hint">Enter to send · Shift+Enter for newline</span>
        </div>
      </div>

      <!-- History Tab -->
      <div class="tab-content" id="historyTab">
        <div class="history-list" id="historyList">
          <div class="empty-history">No history yet.<br/>Start chatting!</div>
        </div>
        <div class="history-footer">
          <button class="clear-btn" id="clearHistoryBtn">Clear History</button>
        </div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
